version: "3.9"

services:
  # ── SQL Server ───────────────────────────────────────────────────────────────
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: notes-db
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "NotesApp@Strong123" # must be 8+ chars, mixed case, number, symbol
      MSSQL_PID: "Developer" # free developer edition
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql # persist data between restarts
    healthcheck:
      test:
        [
          "CMD",
          "/opt/mssql-tools18/bin/sqlcmd",
          "-S",
          "localhost",
          "-U",
          "sa",
          "-P",
          "NotesApp@Strong123",
          "-Q",
          "SELECT 1",
          "-No",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Database Init ─────────────────────────────────────────────────────────────
  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: notes-db-init
    depends_on:
      db:
        condition: service_healthy # wait until SQL Server is ready
    volumes:
      - ./NotesApp.API/Data/Scripts:/scripts
    entrypoint: >
      /bin/bash -c "
        /opt/mssql-tools18/bin/sqlcmd
        -S db -U sa -P 'NotesApp@Strong123'
        -Q 'CREATE DATABASE NotesApp' -No 2>/dev/null || true;
        /opt/mssql-tools18/bin/sqlcmd
        -S db -U sa -P 'NotesApp@Strong123'
        -d NotesApp -i /scripts/schema.sql -No;
        echo 'Database initialized.'
      "

  # ── Backend ───────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./NotesApp.API
      dockerfile: Dockerfile
    container_name: notes-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: "Server=db;Database=NotesApp;User Id=sa;Password=NotesApp@Strong123;TrustServerCertificate=True;"
      Jwt__Secret: "N0t3sApp$SuperSecretJwtKey2024!XyZ#Abc"
      Jwt__Issuer: "NotesApp"
      Jwt__Audience: "NotesApp"
      Jwt__ExpiryHours: "24"
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:5104"
    ports:
      - "5104:5104"

  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./notes-app-frontend
      dockerfile: Dockerfile
    container_name: notes-frontend
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  sqldata:
